name: "Make release"

on:
  push:
    tags:
      - "openssl-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        type: string

jobs:
  release:
    runs-on: "releaser-staging"
    env:
      TAG: ${{ github.event.inputs.tag || github.ref }}
    steps:
    - name: "Checkout"
      uses: "actions/checkout@v4"
      with:
        fetch-depth: 1
        ref: ${{ env.TAG }}
        github-server-url: "https://github.openssl.org/"
        repository: "openssl/openssl"
        token: ${{ secrets.GHE_TOKEN }}
        path: ${{ env.TAG }}
    - name: "Prepare assets"
      run: |
        cd ${{ env.TAG }}
        ./util/mktar.sh
        mkdir assets && mv ${{ env.TAG }}.tar.gz assets/ && cd assets
        openssl sha1 < ${{ env.TAG }}.tar.gz | cut -d " " -f 2 > ${{ env.TAG }}.tar.gz.sha1
        openssl sha256 < ${{ env.TAG }}.tar.gz | cut -d " " -f 2 > ${{ env.TAG }}.tar.gz.sha256
        gpg -u ${{ vars.signing_key_uid }} -o ${{ env.TAG }}.tar.gz.asc -sba ${{ env.TAG }}.tar.gz
    - name: "Create release"
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        VERSION=$(echo ${{ env.TAG }} | cut -d "-" -f 2-)
        gh release create ${{ env.TAG }} -t "OpenSSL $VERSION" -d --notes " " -R ${{ github.repository }} ${{ env.TAG }}/assets/*
